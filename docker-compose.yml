name: srp-dynacard

services:
  postgres:
    image: timescale/timescaledb-ha:pg16
    environment:
      POSTGRES_USER: ${PGUSER:-srp}
      POSTGRES_PASSWORD: ${PGPASSWORD:-srp}
      POSTGRES_DB: ${PGDATABASE:-srp}
    volumes:
      - pgdata:/home/postgres/pgdata/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-srp} -d ${PGDATABASE:-srp}"]
      interval: 5s
      timeout: 5s
      retries: 20

  mosquitto:
    image: eclipse-mosquitto:2
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    ports:
      - "1883:1883"

  ingest:
    build:
      context: ./services
      dockerfile: ingest/Dockerfile
    environment:
      PGHOST: postgres
      PGUSER: ${PGUSER:-srp}
      PGPASSWORD: ${PGPASSWORD:-srp}
      PGDATABASE: ${PGDATABASE:-srp}
      MQTT_HOST: mosquitto
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_started
    restart: unless-stopped

  simulator:
    build:
      context: ./services
      dockerfile: simulator/Dockerfile
    environment:
      PGHOST: postgres
      PGUSER: ${PGUSER:-srp}
      PGPASSWORD: ${PGPASSWORD:-srp}
      PGDATABASE: ${PGDATABASE:-srp}
      MQTT_HOST: mosquitto
      BACKFILL_HOURS: ${BACKFILL_HOURS:-72}
      LIVE_INTERVAL: ${LIVE_INTERVAL:-15}
      DO_BACKFILL: ${DO_BACKFILL:-true}
      DO_LIVE: ${DO_LIVE:-true}
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_started
      ingest:
        condition: service_started
    restart: unless-stopped

  api:
    build:
      context: ./services
      dockerfile: api/Dockerfile
    environment:
      PGHOST: postgres
      PGUSER: ${PGUSER:-srp}
      PGPASSWORD: ${PGPASSWORD:-srp}
      PGDATABASE: ${PGDATABASE:-srp}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    depends_on:
      - api
    ports:
      - "8080:80"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_DEFAULT_THEME: dark
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"

volumes:
  pgdata:
  grafana-data:
